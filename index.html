<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE OASIS — Collection 80·90</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   RESET & CSS VARIABLES
═══════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c-primary:   #00d4ff;
  --c-secondary: #0066ff;
  --c-accent:    #00ffaa;
  --c-warning:   #ff6600;
  --c-danger:    #ff0055;
  --c-gold:      #ffcc00;
  --bg:          #010810;
  --bg2:          #020c18;
  --glass:       rgba(0,180,255,.06);
  --border:      rgba(0,180,255,.18);
  --text:        #c8e8ff;
  --text-dim:    rgba(180,220,255,.65);
  --uc1: #00d4ff;
  --uc2: #0044ff;
  --uspeed: 1.4s;
  --usky1: #010810;
  --usky2: #020c1a;
  --f-title: 'Orbitron', sans-serif;
  --f-ui:    'Rajdhani', sans-serif;
  --f-mono:  'Share Tech Mono', monospace;
  --f-pixel: 'Press Start 2P', monospace;
}

body{
  font-family:var(--f-ui);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  cursor:crosshair;
}

/* ═══════════════════════════════════════════════════
   SCENE & EFFECTS
═══════════════════════════════════════════════════ */
#scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:#000;}
.rpo-sky{position:absolute;inset:0;background:radial-gradient(ellipse 120% 60% at 50% 100%,rgba(0,30,60,.9) 0%,transparent 70%),linear-gradient(to bottom,#000005 0%,#010818 35%,#020c1a 65%,#010610 100%);}
.rpo-stars{position:absolute;inset:0;background-image:radial-gradient(1px 1px at 8% 6%,rgba(255,255,255,.9),transparent),radial-gradient(1px 1px at 16% 14%,rgba(200,240,255,.7),transparent);animation:stars-twinkle 5s ease-in-out infinite alternate;}
@keyframes stars-twinkle{0%{opacity:.65}100%{opacity:1}}
.rpo-rain-wrap{position:absolute;inset:0;z-index:1;overflow:hidden;}
.rpo-rain-col{position:absolute;top:0;bottom:0;font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.4;color:rgba(0,220,255,.5);text-shadow:0 0 8px rgba(0,200,255,.8);white-space:pre;animation:rain-fall linear infinite;opacity:0;pointer-events:none;}
@keyframes rain-fall{0%{transform:translateY(-120%);opacity:0;}5%{opacity:1;}85%{opacity:.5;}100%{transform:translateY(120%);opacity:0;}}
.rpo-floor-wrap{position:absolute;bottom:0;left:-15%;right:-15%;height:55%;perspective:600px;transform-origin:top center;z-index:3;}
.rpo-floor{position:absolute;inset:0;transform:rotateX(68deg);transform-origin:top center;background-size:7% 5.5%,7% 5.5%,14% 11%;animation:rpo-floor-scroll 1.4s linear infinite;}
@keyframes rpo-floor-scroll{0%{background-position:0 0}100%{background-position:0 5.5%}}
.rpo-horizon{position:absolute;left:0;right:0;top:44.5%;height:2px;z-index:6;box-shadow:0 0 3px 1px #fff,0 0 16px 5px rgba(0,200,255,.8);}
.rpo-vp{position:absolute;left:50%;top:44.5%;transform:translate(-50%,-50%);width:clamp(180px,38vw,480px);height:clamp(90px,19vw,240px);z-index:5;animation:vp-pulse 5s ease-in-out infinite;}
@keyframes vp-pulse{0%,100%{opacity:.75;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}}

/* DASHBOARD STYLES (Simplified for summary) */
.wrapper{max-width:1300px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:10;}
.hero{text-align:center;padding:56px 20px 40px;}
.portal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
.portal{border-radius:14px;overflow:hidden;border:1px solid rgba(0,180,255,.1);background:rgba(2,8,22,.88);backdrop-filter:blur(12px);cursor:pointer;position:relative;transition:transform .35s cubic-bezier(.2,.8,.3,1);}
.portal:hover{transform:translateY(-9px) scale(1.025);}
.portal-banner{height:145px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.portal-logo{width:115px;height:105px;display:flex;align-items:center;justify-content:center;z-index:3;}

/* MODALS */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:#030912;border:1px solid rgba(0,180,255,.22);border-radius:12px;padding:26px;width:100%;max-width:500px;}
</style>
</head>
<body>

<div id="scene">
  <div class="rpo-sky"></div>
  <div class="rpo-stars"></div>
  <div class="rpo-rain-wrap" id="rpoRain"></div>
  <div class="rpo-floor-wrap"><div class="rpo-floor" id="rpoFloor"></div></div>
  <div class="rpo-horizon" id="rpoHorizon"></div>
  <div class="rpo-vp" id="rpoVP"></div>
</div>

<div id="dashboard" class="wrapper">
  <div class="hero">
    <h1 style="font-family:var(--f-title); font-size:3rem; margin-bottom:20px;">THE OASIS</h1>
    <div class="portal-grid" id="portalGrid"></div>
  </div>
</div>

<script>
'use strict';
const JSONBIN_ID  = '69cd245b856a682189ed1149';
const JSONBIN_KEY = '$2a$10$RhAmmY/LMSis8Cc9EnmGPOGjkxFY3DPrl5h7Z9yUD3plt8La67DT6';

const DEFAULT_UNIVS = [
  {id:'seiya', name:'Saint Seiya', icon:'🏛️', c1:'#f0c040', c2:'#cd7f32', sky1:'#0f0a00', sky2:'#1a1300'},
  {id:'mask', name:'M.A.S.K.', icon:'🚗', c1:'#00d4ff', c2:'#0055ff', sky1:'#00080f', sky2:'#001525'}
];

function hexA(h,a){const [r,g,b]=h.match(/\w\w/g).map(x=>parseInt(x,16));return `rgba(${r},${g},${b},${a})`;}

function applyTheme(u){
  const r=document.documentElement.style;
  r.setProperty('--uc1',u.c1);
  r.setProperty('--uc2',u.c2);
  
  const fg=document.getElementById('rpoFloor');
  if(fg){
    fg.style.backgroundImage=`linear-gradient(${hexA(u.c1,.13)} 1px,transparent 1px),linear-gradient(90deg,${hexA(u.c1,.13)} 1px,transparent 1px),repeating-conic-gradient(rgba(0,30,60,.95) 0% 25%,rgba(0,10,30,.98) 25% 50%)`;
  }
}

// ── CORRECTION DU TOKEN ICI ──
function initRain(){
  const rain=document.getElementById('rpoRain');
  if(!rain) return;
  const chars='01アイウエオカキクABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';
  const cols=Math.ceil(window.innerWidth/22);
  for(let i=0; i<cols; i++){
    const c=document.createElement('div');
    c.className='rpo-rain-col';
    c.style.left=(i*(100/cols))+'%';
    let len=15, txt='';
    // CORRECTION : Utilisation de \n pour éviter l'erreur de token
    for(let j=0; j<len; j++) txt += chars[Math.floor(Math.random()*chars.length)] + '\n';
    c.textContent=txt;
    c.style.animationDuration=(4+Math.random()*10)+'s';
    c.style.animationDelay=(Math.random()*5)+'s';
    rain.appendChild(c);
  }
}

function renderDash(){
  const g=document.getElementById('portalGrid');
  g.innerHTML = DEFAULT_UNIVS.map(u => `
    <div class="portal" onclick="alert('Ouverture de ${u.name}')">
      <div class="portal-banner" style="background:${u.sky1}">
        <span style="font-size:3rem">${u.icon}</span>
      </div>
      <div style="padding:15px; text-align:center;">
        <h3 style="font-family:var(--f-title); font-size:0.9rem;">${u.name}</h3>
      </div>
    </div>
  `).join('');
}

window.onload = () => {
  initRain();
  renderDash();
  applyTheme(DEFAULT_UNIVS[0]);
};
</script>
</body>
</html>
